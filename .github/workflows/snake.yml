name: Generate Snake
 
on:
  schedule:
    - cron: "0 0 * * *"  # 매일 자정에 실행
  workflow_dispatch:       # 수동 실행도 가능
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: PJHNode
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=gray&color_dots=#c9d1d9,#6e7681,#3b3b3b,#1a1a2e,#000000
 
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
